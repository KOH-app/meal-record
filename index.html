<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食事記録</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .form-group {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>🍽️ 食事記録</h1>

    <div class="form-group">
        <label>📅 日付・時間</label>
        <input type="datetime-local" id="datetime">
    </div>

    <div class="form-group">
        <label>⏱️ 食事にかかった時間（分）</label>
        <input type="number" id="duration" placeholder="例：20">
    </div>

    <div class="form-group">
        <label>📷 写真</label>
        <input type="file" id="photo" accept="image/*" capture="environment">
    </div>

    <div class="form-group">
        <label>💊 食後の体調</label>
        <textarea id="condition" rows="3" placeholder="例：少し眠い、胃が重い、元気など"></textarea>
    </div>

    <button id="saveRecord()">記録する</button>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebaseの設定（ここを置き換える）
 "実際の値"
};
        // 初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 現在の日時をセット
        const firebaseConfig = {

  apiKey: "AIzaSyCPPQbwhTmuQi2OVS4UZZLM718GaRXt6wA",

  authDomain: "food-diary-e17e4.firebaseapp.com",

  projectId: "food-diary-e17e4",

  storageBucket: "food-diary-e17e4.firebasestorage.app",

  messagingSenderId: "124881961514",

  appId: "1:124881961514:web:bcf81615732c3b08db7953"

};
document.getElementById('datetime').value = localDatetime;

        // 記録を保存する関数
        window.saveRecord = async function() {
            const datetime = document.getElementById('datetime').value;
            const duration = document.getElementById('duration').value;
            const condition = document.getElementById('condition').value;

            if (!datetime || !duration) {
                alert('日付・時間と食事時間は必須です！');
                return;
            }

            try {
                await addDoc(collection(db, "meals"), {
                    datetime: datetime,
                    duration: Number(duration),
                    condition: condition,
                    createdAt: new Date()
                });
                alert('記録しました！');
            } catch (e) {
                alert('エラーが発生しました：' + e.message);
            }
        }
        document.getElementById('saveButton').addEventListener('click', saveRecord);
    </script>
</body>
</html>
