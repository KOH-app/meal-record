<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食事記録</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="食事記録">
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .form-group {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #preview {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        .record {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .record img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }
        .record-date {
            font-size: 14px;
            color: #888;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: white;
            border: none;
            border-radius: 10px;
            margin-right: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .tab.active {
            background-color: #4CAF50;
            color: white;
        }
        #recordForm, #recordList {
            display: none;
        }
    </style>
</head>
<body>
    <h1>🍽️ 食事記録</h1>

    <div class="tabs">
        <button class="tab active" id="tabRecord" onclick="showTab('record')">記録する</button>
        <button class="tab" id="tabList" onclick="showTab('list')">一覧</button>
    </div>

    <div id="recordForm">
        <div class="form-group">
            <label>📅 日付・時間</label>
            <input type="datetime-local" id="datetime">
        </div>

        <div class="form-group">
            <label>⏱️ 食事にかかった時間（分）</label>
            <input type="number" id="duration" placeholder="例：20">
        </div>

        <div class="form-group">
            <label>📷 写真</label>
            <input type="file" id="photo" accept="image/*" multiple>
            <div id="preview"></div>
        </div>

        <div class="form-group">
            <label>💊 食後の体調</label>
            <textarea id="condition" rows="3" placeholder="例：少し眠い、胃が重い、元気など"></textarea>
        </div>

        <button id="saveButton">記録する</button>
    </div>

    <div id="recordList">
        <div id="listContent">読み込み中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, orderBy, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCPPQbwhTmuQi2OVS4UZZLM718GaRXt6wA",
            authDomain: "food-diary-e17e4.firebaseapp.com",
            projectId: "food-diary-e17e4",
            storageBucket: "food-diary-e17e4.firebasestorage.app",
            messagingSenderId: "124881961514",
            appId: "1:124881961514:web:bcf81615732c3b08db7953"
        };

        const app = initializeApp(firebaseConfig);
        let editId = null;
        let editPhotoId = null;
        const db = getFirestore(app);

        // IndexedDBの設定
        let idb;
        const idbRequest = indexedDB.open('mealPhotos', 1);
        idbRequest.onupgradeneeded = (e) => {
            idb = e.target.result;
            idb.createObjectStore('photos', { keyPath: 'id' });
        };
        idbRequest.onsuccess = (e) => {
            idb = e.target.result;
        };

        // 写真をIndexedDBに保存
        function savePhoto(id, blob) {
            return new Promise((resolve, reject) => {
                const tx = idb.transaction('photos', 'readwrite');
                const store = tx.objectStore('photos');
                store.put({ id, blob });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // 写真をIndexedDBから取得
        function getPhoto(id) {
            return new Promise((resolve, reject) => {
                const tx = idb.transaction('photos', 'readonly');
                const store = tx.objectStore('photos');
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result ? req.result.blob : null);
                req.onerror = () => reject(req.error);
            });
        }

        // 現在の日時をセット
        const now = new Date();
        const localDatetime = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
            .toISOString()
            .slice(0, 16);
        document.getElementById('datetime').value = localDatetime;

        // 写真プレビュー
        document.getElementById('photo').addEventListener('change', (e) => {
            const files = e.target.files;
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.cssText = 'width:100%;border-radius:10px;margin-top:10px;';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        });

        // 記録を保存
        document.getElementById('saveButton').addEventListener('click', async () => {
            const datetime = document.getElementById('datetime').value;
            const duration = document.getElementById('duration').value;
            const condition = document.getElementById('condition').value;
            const photoFile = document.getElementById('photo').files[0];

            if (!datetime || !duration) {
                alert('日付・時間と食事時間は必須です！');
                return;
            }

            try {
                const photoFiles = document.getElementById('photo').files;
                const photoIds = [];
                if (photoFiles.length > 0) {
                    for (const file of photoFiles) {
                        const photoId = 'photo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                        await savePhoto(photoId, file);
                        photoIds.push(photoId);
                    }
                } else if (editPhotoId) {
                    photoIds.push(...(Array.isArray(editPhotoId) ? editPhotoId : [editPhotoId]));
                }

                if (photoFile && idb) {
                    await savePhoto(photoId, photoFile);
                }

                if (editId) {
                    await updateDoc(doc(db, "meals", editId), {
                        datetime: datetime,
                        duration: Number(duration),
                        condition: condition,
                        photoId: photoIds,
                    });
                    editId = null;
                    editPhotoId = null;
                    alert('更新しました！');
                } else {
                    await addDoc(collection(db, "meals"), {
                        datetime: datetime,
                        duration: Number(duration),
                        condition: condition,
                        photoId: photoIds,
                        createdAt: new Date()
                    });
                    alert('記録しました！');
                }

                // フォームをリセット
                document.getElementById('duration').value = '';
                document.getElementById('condition').value = '';
                document.getElementById('photo').value = '';
                document.getElementById('preview').style.display = 'none';

                const now = new Date();
                const localDatetime = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
                    .toISOString()
                    .slice(0, 16);
                document.getElementById('datetime').value = localDatetime;

            } catch (e) {
                alert('エラーが発生しました：' + e.message);
            }
        });

        // 一覧を表示
        async function loadRecords() {
            const listContent = document.getElementById('listContent');
            listContent.innerHTML = '読み込み中...';

            try {
                const q = query(collection(db, "meals"), orderBy("datetime", "desc"));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    listContent.innerHTML = '<p>記録がありません</p>';
                    return;
                }

                listContent.innerHTML = '';

                for (const docSnapshot of snapshot.docs) {
                    const data = docSnapshot.data();
                    const div = document.createElement('div');
                    div.className = 'record';

                    let photoHtml = '';
                    if (data.photoId && idb) {
                        const photoIdArray = Array.isArray(data.photoId) ? data.photoId : [data.photoId];
                        for (const pid of photoIdArray) {
                            const blob = await getPhoto(pid);
                            if (blob) {
                                const url = URL.createObjectURL(blob);
                                photoHtml += `<img src="${url}" alt="食事の写真" style="width:100%;border-radius:10px;margin-top:10px;">`;
                            }
                        }
                    }
                    div.innerHTML = `
                        <div class="record-date">${data.datetime.replace('T', ' ')}</div>
                        <div>⏱️ ${data.duration}分</div>
                        <div>💊 ${data.condition || 'メモなし'}</div>
                        ${photoHtml}
                        <div style="display:flex;gap:10px;margin-top:10px;">
                            <button class="editButton" data-id="${docSnapshot.id}" style="background-color:#1976D2;flex:1;">✏️ 編集</button>
                            <button class="deleteButton" data-id="${docSnapshot.id}" style="background-color:#e53935;flex:1;">🗑️ 削除</button>
                        </div>
                    `;
                    listContent.appendChild(div);
                    div.querySelector('.editButton').addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        const data = docSnapshot.data();
                        document.getElementById('datetime').value = data.datetime;
                        document.getElementById('duration').value = data.duration;
                        document.getElementById('condition').value = data.condition || '';
                        editId = id;
                        editPhotoId = data.photoId || null;
                        if (data.photoId && idb) {
                            const photoIdArray = Array.isArray(data.photoId) ? data.photoId : [data.photoId];
                            const preview = document.getElementById('preview');
                            preview.innerHTML = '';
                            for (const pid of photoIdArray) {
                                const blob = await getPhoto(pid);
                                if (blob) {
                                    const url = URL.createObjectURL(blob);
                                    const img = document.createElement('img');
                                    img.src = url;
                                    img.style.cssText = 'width:100%;border-radius:10px;margin-top:10px;';
                                    preview.appendChild(img);
                                }
                            }
                        }
                        showTab('record');
                    });
                    div.querySelector('.deleteButton').addEventListener('click', async (e) => {
                    if (!confirm('この記録を削除しますか？')) return;
                    const id = e.target.dataset.id;
                    try {
                        await deleteDoc(doc(db, "meals", id));
                        alert('削除しました！');
                        loadRecords();
                    } catch (e) {
                        alert('エラーが発生しました：' + e.message);
                    }
                });
                }
            } catch (e) {
                listContent.innerHTML = 'エラーが発生しました：' + e.message;
            }
        }

        // タブ切り替え
        window.showTab = function(tab) {
            if (tab === 'record') {
                document.getElementById('recordForm').style.display = 'block';
                document.getElementById('recordList').style.display = 'none';
                document.getElementById('tabRecord').classList.add('active');
                document.getElementById('tabList').classList.remove('active');
            } else {
                document.getElementById('recordForm').style.display = 'none';
                document.getElementById('recordList').style.display = 'block';
                document.getElementById('tabRecord').classList.remove('active');
                document.getElementById('tabList').classList.add('active');
                loadRecords();
            }
        };

        // 最初に記録フォームを表示
        showTab('record');
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/meal-record/service-worker.js')
                    .then((reg) => console.log('Service Worker登録成功:', reg))
                    .catch((err) => console.log('Service Worker登録失敗:', err));
            });
        }
    </script>
</body>
</html>
